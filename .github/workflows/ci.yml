name: CI/CD Pipeline

# Trigger this workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Build the Docker image
      - name: Build Docker image
        run: |
          # Build the Docker image with a tag 'latest'
          docker build -t ${{ secrets.DOCKER_USERNAME }}/student-tracker:latest ./student-result-tracker

      # Step 3: Login to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Push the Docker image to Docker Hub
      - name: Push image to Docker Hub
        run: |
          # Push the built image to the Docker Hub repository
          docker push ${{ secrets.DOCKER_USERNAME }}/student-tracker:latest
